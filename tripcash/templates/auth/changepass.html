{% extends 'base.html' %}

{% block header %}
  <h1 class="h2 text-center mb-4">{% block title %}{{ _('Change your password') }}{% endblock %}</h1>
{% endblock %}

{% block content %}
  <div class="card shadow-sm mx-auto" style="max-width: 400px;">
    <div class="card-body p-4">
      <form class="d-flex flex-column gap-3" method="post">
        <div class="form-group">
          <label class="form-label" for="current_password">{{ _('Current Password') }}</label>
          <input type="password" class="form-control" name="current_password" id="current_password" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">{{ _('New Password') }}</label>
          <input type="password" class="form-control" name="new_password" id="new_password" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password2">{{ _('Confirm the new password') }}</label>
          <input type="password" class="form-control" name="new_password2" id="new_password2" required>
        </div>
        <div class="d-grid mt-2">
          <button class="btn btn-primary btn-lg" type="submit">{{ _('Change') }}</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
