{% extends 'base.html' %}

{% block header %}
  <h1 class="h2 text-center mb-4">{% block title %}{{ _('Log In') }}{% endblock %}</h1>
{% endblock %}

{% block content %}
  <div class="card shadow-sm mx-auto" style="max-width: 400px;">
    <div class="card-body p-4">
      <form class="d-flex flex-column gap-3" method="post">
        <div class="form-group">
          <label class="form-label" for="username">{{ _('Username') }}</label>
          <input autocomplete="off" autofocus class="form-control" name="username" id="username" required type="text">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">{{ _('Password') }}</label>
          <input type="password" class="form-control" name="password" id="password" required>
        </div>
        <div class="d-grid mt-2">
          <button class="btn btn-primary btn-lg" type="submit">{{ _('Log In') }}</button>
        </div>
      </form>
    </div>
    {% if allow_registration %}
    <div class="card-footer text-center py-3" style="border-top: 1px solid var(--border-color); background: transparent;">
      <small class="text-secondary">{{ _("Don't have an account?") }} <a href="{{ url_for('auth.register') }}" class="text-decoration-none" style="color: var(--accent-color);">{{ _('Register') }}</a></small>
    </div>
    {% endif %}
  </div>
{% endblock %}
