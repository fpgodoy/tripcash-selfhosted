{% extends 'base.html' %}

{% block header %}
  <h1 class="h2">{% block title %}{{ _('Register a Settlement') }}{% endblock %}</h1>
{% endblock %}

{% block content %}
<div class="card shadow-sm mx-auto" style="max-width: 500px;">
    <div class="card-body">
        <form method="post">
            <div class="form-group mb-3">
                <label class="form-label">{{ _('Who Paid?') }}</label>
                <select class="form-select border-info" name="payer_id" required>
                    <option value="">{{ _('Select Payer') }}</option>
                    {% for p in participants %}
                        <option value="{{ p.id }}">{{ p.name }} {% if p.is_user and p.name == g.user['username'] %}({{ _('You') }}){% endif %}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group mb-3">
                <label class="form-label">{{ _('Who Received?') }}</label>
                <select class="form-select border-success" name="receiver_id" required>
                    <option value="">{{ _('Select Receiver') }}</option>
                    {% for p in participants %}
                        <option value="{{ p.id }}">{{ p.name }} {% if p.is_user and p.name == g.user['username'] %}({{ _('You') }}){% endif %}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group mb-3">
                <label class="form-label">{{ _('Amount') }}</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input class="form-control money" name="amount" type="number" step="0.01" min="0.01" required>
                </div>
            </div>
            <div class="form-group mb-3">
                <label class="form-label">{{ _('Date') }}</label>
                <input class="form-control" name="date" type="date" value="{{ today }}" required>
            </div>
            
            <div class="row g-2 mt-4 justify-content-md-end">
                <div class="col-6 col-md-auto d-grid">
                    <a class="btn btn-secondary" href="{{ url_for('settlement.show') }}">{{ _('Back') }}</a>
                </div>
                <div class="col-6 col-md-auto d-grid">
                    <button class="btn btn-primary" type="submit">{{ _('Register Payment') }}</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
